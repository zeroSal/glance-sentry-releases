name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Build binaries
        env:
          VERSION: ${{ github.ref_name }}
          CHANNEL: release
        run: |
          mkdir -p build
          make build

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/glance-sentry-releases-*
          draft: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}